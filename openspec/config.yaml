schema: spec-driven

# Project context shown to the AI when it drafts change artifacts.
context: |
  WongStack is a stack-agnostic Claude Code workflow toolkit, shipped as a
  template you clone and work from. The payload is markdown: skills under
  .claude/skills/, the docs/ progressive-disclosure wiki, CLAUDE.md, VERSION,
  CHANGELOG.md. There is no build/test suite in this repo — the payload is prose.
  CI is an optional accelerator: it's the gate in a *target* repo when checks
  exist, else PR review is; nothing builds locally either way.

  Planning runs on OpenSpec: a change is openspec/changes/<name>/ (proposal,
  specs, design, tasks). Changes live on the default branch (main) so they are
  visible from any clone; code lives on a feature branch named after the change.
  The WongStack skills own all git — OpenSpec never runs git itself.

  Editing the payload is a release: bump VERSION (semver) and add a newest-first
  CHANGELOG.md entry in the same change.

# Per-artifact rules.
rules:
  proposal:
    - Keep it tight — what changes and why, plus a Non-goals line.
  design:
    - If the change adds or meaningfully restructures a user-facing screen (a page
      or component — not merely touching a UI file), include a "## UX" section
      following docs/ux-principles.md — use-case brief (who, the job, what done
      looks like, context of use, common vs edge case, stated frequency assumptions),
      the shortest flow from intent to done, hierarchy (the one primary action per
      screen), ASCII wireframes including empty/error states, and the component
      inventory. Prefer mirroring the closest existing screen; name it in the brief.
      Skip the section for UI-less changes (worker, CLI, library).
  tasks:
    - Group tasks by the surface they touch (skill, script, docs, CLAUDE.md).
    - UI tasks reference the design.md "## UX" subsection they implement
      (e.g. 'Build list view per design.md ## UX — Wireframes').
    - A payload change is not done until VERSION and CHANGELOG.md are updated.
